version: "3.8"

services:
  vulhub-web:
    build: .
    container_name: vulhub-web
    ports:
      - "8088:8088"
    volumes:
      # Mount Docker socket so Vulhub-Web can control the host Docker daemon
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount your Vulhub clone (read-only recommended)
      - /path/to/vulhub:/vulhub:ro
      # Persist SQLite database
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
