version: "3.8"

# Assumes the following sibling layout:
#   ~/work/
#   ├── vulhub/        ← git clone https://github.com/vulhub/vulhub
#   └── Vulhub-Web/    ← this repo (docker-compose.yml lives here)

services:
  vulhub-web:
    build: .
    container_name: vulhub-web
    ports:
      - "8088:8088"
    volumes:
      # Mount host Docker socket so Vulhub-Web controls the host daemon
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount sibling Vulhub repo (read-only)
      - ../vulhub:/vulhub:ro
      # Persist SQLite database
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
