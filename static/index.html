<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vulhub-Web 靶场管理平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="/static/css/app.css" rel="stylesheet">
</head>
<body>
    <!-- 登录页 -->
    <div id="page-login" class="page d-none">
        <div class="login-wrapper">
            <div class="login-card">
                <div class="login-logo">
                    <i class="bi bi-shield-lock-fill"></i>
                </div>
                <h2 class="login-title">Vulhub-Web</h2>
                <p class="login-subtitle">靶场管理平台</p>
                <div id="login-form-init" class="d-none">
                    <div class="mb-3">
                        <label class="form-label">设置管理员密码</label>
                        <input type="password" class="form-control" id="init-password" placeholder="请输入密码（至少4位）">
                    </div>
                    <button class="btn btn-primary w-100" id="btn-init-password">初始化密码</button>
                </div>
                <div id="login-form-login" class="d-none">
                    <div class="mb-3">
                        <label class="form-label">管理员密码</label>
                        <input type="password" class="form-control" id="login-password" placeholder="请输入密码">
                    </div>
                    <button class="btn btn-primary w-100" id="btn-login">登录</button>
                </div>
                <div id="login-message" class="mt-3 text-danger small d-none"></div>
            </div>
        </div>
    </div>

    <!-- 主界面 -->
    <div id="page-main" class="page d-none">
        <!-- 顶部导航 -->
        <nav class="top-nav">
            <div class="d-flex align-items-center">
                <button class="btn btn-link nav-toggle d-lg-none" id="sidebar-toggle">
                    <i class="bi bi-list"></i>
                </button>
                <span class="nav-brand">
                    <i class="bi bi-shield-lock-fill me-2"></i>Vulhub-Web
                </span>
            </div>
            <div class="nav-tabs-custom">
                <a href="#" class="nav-tab active" data-page="vulns">
                    <i class="bi bi-bug me-1"></i>漏洞库
                </a>
                <a href="#" class="nav-tab" data-page="running">
                    <i class="bi bi-play-circle me-1"></i>运行中
                </a>
                <a href="#" class="nav-tab" data-page="settings">
                    <i class="bi bi-gear me-1"></i>设置
                </a>
            </div>
            <div class="d-flex align-items-center gap-2">
                <span class="docker-status" id="docker-status-badge" title="Docker 状态">
                    <i class="bi bi-circle-fill"></i>
                </span>
                <button class="btn btn-outline-light btn-sm" id="btn-logout">
                    <i class="bi bi-box-arrow-right me-1"></i>退出
                </button>
            </div>
        </nav>

        <!-- 内容区域 - fixed 定位铺满剩余空间 -->
        <div class="main-content">
            <!-- 漏洞库页面：左右 flex 布局 -->
            <div id="content-vulns" class="content-page">
                <!-- 左侧分类侧边栏 - flex 子元素，不再 fixed -->
                <div class="sidebar" id="sidebar">
                    <div class="sidebar-header">
                        <span class="sidebar-title">漏洞分类</span>
                        <button class="sidebar-collapse-btn" id="btn-sidebar-collapse" title="收起侧边栏">
                            <i class="bi bi-chevron-left"></i>
                        </button>
                    </div>
                    <div class="sidebar-body" id="category-list">
                        <div class="category-item active" data-category="all">
                            <i class="bi bi-grid-3x3-gap"></i>
                            <span>全部</span>
                            <span class="badge" id="category-all-count">0</span>
                        </div>
                    </div>
                </div>

                <!-- 右侧主内容区 - flex column 布局 -->
                <div class="content-area">
                    <!-- 顶部工具栏 -->
                    <div class="filter-bar">
                        <div class="d-flex gap-2 flex-wrap align-items-center">
                            <button class="sidebar-expand-btn" id="btn-sidebar-expand" title="展开侧边栏">
                                <i class="bi bi-chevron-right"></i>
                            </button>
                            <select class="form-select form-select-sm" id="filter-status" style="width:140px">
                                <option value="all">全部状态</option>
                                <option value="unbuilt">未构建</option>
                                <option value="built">已构建</option>
                                <option value="running">运行中</option>
                            </select>
                            <select class="form-select form-select-sm" id="filter-year" style="width:120px">
                                <option value="all">全部年份</option>
                            </select>
                            <div class="input-group input-group-sm" style="width:280px">
                                <input type="text" class="form-control" id="search-keyword" placeholder="搜索 CVE / 漏洞名称">
                                <button class="btn btn-outline-secondary" id="btn-search"><i class="bi bi-search"></i></button>
                            </div>
                            <button class="btn btn-sm btn-outline-primary ms-auto" id="btn-scan">
                                <i class="bi bi-arrow-repeat me-1"></i>扫描漏洞库
                            </button>
                        </div>
                    </div>
                    <!-- 表格滚动区域 -->
                    <div class="vuln-table-wrapper">
                        <table class="table vuln-table">
                            <thead>
                                <tr>
                                    <th style="width:160px">CVE 编号</th>
                                    <th style="width:200px">漏洞名称</th>
                                    <th>简介</th>
                                    <th style="width:100px">分类</th>
                                    <th style="width:90px">状态</th>
                                    <th style="width:220px">操作</th>
                                </tr>
                            </thead>
                            <tbody id="vuln-table-body">
                            </tbody>
                        </table>
                    </div>
                    <!-- 底部分页 -->
                    <div class="pagination-wrapper" id="vuln-pagination"></div>
                </div>
            </div>

            <!-- 漏洞详情页面 -->
            <div id="content-detail" class="content-page d-none">
                <div class="detail-page">
                    <div class="detail-header">
                        <button class="btn btn-sm btn-outline-secondary" id="btn-back-vulns">
                            <i class="bi bi-arrow-left me-1"></i>返回列表
                        </button>
                        <div class="detail-info" id="detail-info"></div>
                    </div>
                    <div class="detail-body">
                        <div class="detail-readme" id="detail-readme"></div>
                    </div>
                    <div class="detail-bottom-panel">
                        <ul class="nav nav-tabs" role="tablist">
                            <li class="nav-item">
                                <a class="nav-link active" data-bs-toggle="tab" href="#tab-logs">
                                    <i class="bi bi-terminal me-1"></i>日志
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" data-bs-toggle="tab" href="#tab-terminal">
                                    <i class="bi bi-code-slash me-1"></i>终端
                                </a>
                            </li>
                        </ul>
                        <div class="tab-content">
                            <div class="tab-pane fade show active" id="tab-logs">
                                <div class="log-panel" id="log-panel"></div>
                            </div>
                            <div class="tab-pane fade" id="tab-terminal">
                                <div id="terminal-container"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 运行中靶机页面 -->
            <div id="content-running" class="content-page d-none">
                <div class="running-page">
                    <div class="running-header">
                        <h5><i class="bi bi-play-circle me-2"></i>运行中靶机</h5>
                        <div class="d-flex gap-2">
                            <button class="btn btn-sm btn-outline-danger" id="btn-batch-destroy">
                                <i class="bi bi-trash me-1"></i>批量销毁
                            </button>
                            <button class="btn btn-sm btn-outline-secondary" id="btn-refresh-running">
                                <i class="bi bi-arrow-repeat me-1"></i>刷新
                            </button>
                        </div>
                    </div>
                    <div class="running-table-wrapper">
                        <table class="table vuln-table">
                            <thead>
                                <tr>
                                    <th style="width:40px"><input type="checkbox" id="select-all-running"></th>
                                    <th style="width:160px">CVE 编号</th>
                                    <th style="width:180px">漏洞名称</th>
                                    <th style="width:100px">运行时长</th>
                                    <th>访问地址</th>
                                    <th style="width:140px">资源占用</th>
                                    <th style="width:200px">操作</th>
                                </tr>
                            </thead>
                            <tbody id="running-table-body">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- 设置页面 -->
            <div id="content-settings" class="content-page d-none">
                <div class="settings-page">
                    <div class="row g-4">
                        <div class="col-lg-8">
                            <div class="settings-card">
                                <h6 class="settings-card-title"><i class="bi bi-folder2-open me-2"></i>基础配置</h6>
                                <div class="mb-3">
                                    <label class="form-label">Vulhub 源码根目录</label>
                                    <input type="text" class="form-control" id="setting-vulhub-path" placeholder="/home/user/vulhub">
                                    <div class="form-text">设置后保存将自动扫描漏洞库</div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">服务监听端口</label>
                                    <input type="number" class="form-control" id="setting-server-port" value="8088">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">修改管理员密码</label>
                                    <input type="password" class="form-control" id="setting-admin-password" placeholder="留空则不修改">
                                </div>
                            </div>

                            <div class="settings-card">
                                <h6 class="settings-card-title"><i class="bi bi-hdd me-2"></i>磁盘策略</h6>
                                <div class="mb-3">
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" id="setting-remove-image" checked>
                                        <label class="form-check-label">销毁容器时同步删除镜像</label>
                                    </div>
                                    <div class="form-text">磁盘紧张建议开启，避免镜像占用空间</div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">闲置自动销毁（小时）</label>
                                    <input type="number" class="form-control" id="setting-idle-timeout" value="0" min="0">
                                    <div class="form-text">设为 0 表示禁用自动销毁</div>
                                </div>
                            </div>

                            <div class="settings-card">
                                <h6 class="settings-card-title"><i class="bi bi-clock me-2"></i>定时任务</h6>
                                <div class="mb-3">
                                    <label class="form-label">增量扫描 Cron 表达式</label>
                                    <input type="text" class="form-control" id="setting-scan-cron" value="0 */6 * * *">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">缓存清理 Cron 表达式</label>
                                    <input type="text" class="form-control" id="setting-cleanup-cron" value="0 2 * * *">
                                </div>
                            </div>

                            <button class="btn btn-primary" id="btn-save-settings">
                                <i class="bi bi-check-lg me-1"></i>保存设置
                            </button>
                        </div>

                        <div class="col-lg-4">
                            <div class="settings-card">
                                <h6 class="settings-card-title"><i class="bi bi-info-circle me-2"></i>Docker 信息</h6>
                                <div class="docker-info-grid" id="docker-info-grid">
                                    <div class="docker-info-item">
                                        <div class="docker-info-value" id="docker-disk">0</div>
                                        <div class="docker-info-label">磁盘占用 (GB)</div>
                                    </div>
                                    <div class="docker-info-item">
                                        <div class="docker-info-value" id="docker-images">0</div>
                                        <div class="docker-info-label">镜像总数</div>
                                    </div>
                                    <div class="docker-info-item">
                                        <div class="docker-info-value" id="docker-running">0</div>
                                        <div class="docker-info-label">运行容器</div>
                                    </div>
                                    <div class="docker-info-item">
                                        <div class="docker-info-value" id="docker-stopped">0</div>
                                        <div class="docker-info-label">停止容器</div>
                                    </div>
                                </div>
                            </div>

                            <div class="settings-card">
                                <h6 class="settings-card-title"><i class="bi bi-tools me-2"></i>全局操作</h6>
                                <div class="d-grid gap-2">
                                    <button class="btn btn-sm btn-outline-warning" id="btn-cleanup-stopped">
                                        <i class="bi bi-x-circle me-1"></i>清理停止容器
                                    </button>
                                    <button class="btn btn-sm btn-outline-warning" id="btn-cleanup-dangling">
                                        <i class="bi bi-trash me-1"></i>清理悬空镜像
                                    </button>
                                    <button class="btn btn-sm btn-outline-warning" id="btn-cleanup-cache">
                                        <i class="bi bi-broom me-1"></i>清理构建缓存
                                    </button>
                                    <button class="btn btn-sm btn-outline-danger" id="btn-destroy-all">
                                        <i class="bi bi-exclamation-triangle me-1"></i>一键销毁所有靶机
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast 通知 -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index:11">
        <div id="toast-container"></div>
    </div>

    <!-- 确认弹窗 -->
    <div class="modal fade" id="confirmModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content confirm-modal">
                <div class="modal-body">
                    <p id="confirm-message"></p>
                </div>
                <div class="modal-footer justify-content-center">
                    <button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-sm btn-danger" id="confirm-ok">确认</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/app.js"></script>
    <script src="/static/js/vulns.js"></script>
    <script src="/static/js/detail.js"></script>
    <script src="/static/js/running.js"></script>
    <script src="/static/js/settings.js"></script>
    <script src="/static/js/terminal.js"></script>
</body>
</html>
